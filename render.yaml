services:
  - type: web
    name: ai-content-api
    env: python
    pythonVersion: "3.11"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PAYPAL_MODE
        value: sandbox
      - key: ENVIRONMENT
        value: production