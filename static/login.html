<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - ContentGen API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: #818cf8; --text: #1e293b; --text-muted: #64748b; --bg: #ffffff; --bg-alt: #f8fafc; --border: #e2e8f0; --error: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text); background: var(--bg-alt); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 420px; padding: 20px; }
        .card { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 30px rgba(0,0,0,0.08); border: 1px solid var(--border); }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 700; justify-content: center; margin-bottom: 32px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .logo-icon svg { width: 20px; height: 20px; color: white; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; text-align: center; }
        .subtitle { color: var(--text-muted); text-align: center; margin-bottom: 32px; font-size: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
        input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; font-family: inherit; transition: all 0.2s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .btn { width: 100%; padding: 14px 20px; border-radius: 10px; font-weight: 600; font-size: 15px; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--primary-dark); color: white; box-shadow: 0 4px 14px rgba(79,70,229,0.35); }
        .btn-primary:hover { background: var(--primary); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .forgot { text-align: right; margin-top: -12px; margin-bottom: 20px; }
        .forgot a { color: var(--primary); text-decoration: none; font-size: 14px; }
        .forgot a:hover { text-decoration: underline; }
        .signup-link { text-align: center; margin-top: 24px; color: var(--text-muted); font-size: 14px; }
        .signup-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .signup-link a:hover { text-decoration: underline; }
        .error { background: #fef2f2; border: 1px solid #fecaca; color: var(--error); padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; display: none; }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo"><div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>ContentGen API</div>
            
            <h1>Welcome back</h1>
            <p class="subtitle">Sign in to your account</p>
            
            <div class="error" id="error"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="forgot"><a href="#">Forgot password?</a></div>
                <button type="submit" class="btn btn-primary" id="submitBtn">Sign In</button>
            </form>
            
            <p class="signup-link">Don't have an account? <a href="/signup">Sign up</a></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('error');
        const submitBtn = document.getElementById('submitBtn');

        // Check if already logged in
        const token = localStorage.getItem('api_token');
        if (token) {
            window.location.href = '/dashboard';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            errorEl.classList.remove('show');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            
            try {
                const res = await fetch('/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.detail || 'Login failed');
                }
                
                localStorage.setItem('api_token', data.access_token);
                localStorage.setItem('user_email', email);
                
                window.location.href = '/dashboard';
                
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
